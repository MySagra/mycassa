services:
  mycassa:
    image: mycassa-cassa
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mycassa-cassa
    restart: always
    ports:
      - "3031:3031"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - mysagra_default

networks:
  mysagra_default:
    external: true